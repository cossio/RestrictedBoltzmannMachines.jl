coverage:
  status:
    # Overall repository coverage: must not drop by more than 1% in a PR.
    project:
      default:
        target: auto
        threshold: 1%
    # Coverage of the lines changed/added by a PR: forces new code to come with tests.
    patch:
      default:
        target: 85%

# CUDAExt only loads with a physical GPU; GitHub CI has none, so it can never be covered.
ignore:
  - "ext/CUDAExt.jl"
