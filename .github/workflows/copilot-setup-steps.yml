name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39
        with:
          version: "1"
          arch: x64
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38
      - name: Instantiate workspace environment
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile(strict=true)'
      - name: Instantiate test environment
        run: julia --project=test -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate(); Pkg.precompile(strict=true)'
      - name: Smoke test package load
        run: julia --project=. -e 'import RestrictedBoltzmannMachines as RBMs'
