# Claude review of every pull request.
#
# Reviews the full PR diff and posts inline review comments for real
# findings (bugs, correctness, security), then submits a review verdict:
# approve when convinced the PR is sound, request changes on serious
# confirmed problems, comment-only otherwise. What gets flagged and at
# what severity is governed by REVIEW.md at the repo root, read from the
# PR's base branch so a PR cannot weaken the rules applied to itself.
#
# claude-code-action self-skips when this file differs from the version
# on the default branch (anti-tampering), so PRs that modify this
# workflow get no automated review. On such PRs the job instead posts a
# PR comment explaining that, including the escape hatch: commenting
# "@claude review this PR" still triggers a review, because claude.yml
# runs from the default branch on comment events and always passes the
# validation.
#
# The job itself never fails because of review findings; the verdict is
# expressed through the PR review state. Approving requires the repo
# setting "Allow GitHub Actions to create and approve pull requests"
# (Settings -> Actions -> General); without it, approval falls back to a
# comment. Authenticates with the CLAUDE_CODE_OAUTH_TOKEN repo secret (a
# Claude subscription token from `claude setup-token`) and skips cleanly
# when the secret is unavailable (e.g. fork PRs).
name: Claude PR review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read
concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  review:
    name: Claude review
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    env:
      HAS_KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - name: Note when the token is unavailable
        if: env.HAS_KEY != 'true'
        run: echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not available (fork PR or missing secret); skipping Claude review."
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: env.HAS_KEY == 'true'
        with:
          fetch-depth: 0
      - name: Explain when this PR modifies the review workflow itself
        if: env.HAS_KEY == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" \
              | grep -q '^\.github/workflows/claude-pr-review\.yml$'; then
            echo "::notice::Claude review self-skips on this PR: it modifies the review workflow itself, and claude-code-action only runs the workflow version already on the default branch (anti-tampering). The green check below means skipped, not reviewed. Comment '@claude review this PR' to request a review manually."
            marker='<!-- claude-review-workflow-skip -->'
            if ! gh pr view "$PR_NUMBER" --json comments --jq '.comments[].body' | grep -qF "$marker"; then
              gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          **The automated Claude review cannot run on this PR.** The PR modifies \`.github/workflows/claude-pr-review.yml\`, and \`claude-code-action\` refuses to run from a workflow file that differs from the version on the repository's default branch (anti-tampering). The green "Claude review" check therefore means skipped, not reviewed.

          You can still request a review manually by commenting \`@claude review this PR\` — the \`@claude\` workflow runs from the default branch on comment events, so it always passes the validation.

          $marker
          EOF
          )"
            fi
          fi
      - name: Review pull request with Claude
        if: env.HAS_KEY == 'true'
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1.0.173
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-5
            --max-turns 60
            --allowedTools "Read,Grep,Glob,LS,WebFetch,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh api graphql:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),mcp__github_inline_comment__create_inline_comment"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            First, reconcile earlier runs of this review: list the PR's
            review threads including their replies (`gh api graphql` with
            the pullRequest reviewThreads query). For each unresolved thread
            posted by a previous run of this workflow (bot-authored):
            - If the current code addresses it, or the author's reply
              convincingly rebuts it, resolve the thread with the
              resolveReviewThread GraphQL mutation.
            - If the author replied but you remain unconvinced, reply back
              in the thread (addPullRequestReviewThreadReply mutation)
              explaining briefly why the finding stands.
            Do not post duplicates of comments that are still valid and
            unresolved.

            Then review this pull request. Read the full diff (`gh pr diff`)
            and enough of the surrounding code to judge each change in
            context. Follow the review instructions in REVIEW.md at the
            repo root: they define what to flag, at what severity, and what
            to skip. Read the file as it exists on the PR's base branch —
            `git show "origin/${GITHUB_BASE_REF}:REVIEW.md"` — not from the
            PR checkout, so a PR cannot change the rules applied to itself.
            If the PR modifies REVIEW.md, review that change like any other
            part of the diff. If REVIEW.md is missing or unreadable on the
            base branch, fall back to these defaults: report real problems
            only (bugs and logic errors, correctness of math/statistics,
            API breakage, security issues); do not comment on style,
            formatting, or preferences; if you find nothing significant,
            post no inline comments.

            Post each finding as an inline comment on the relevant line
            using mcp__github_inline_comment__create_inline_comment, with a
            short explanation and, where possible, a concrete suggestion.
            Only include a ```suggestion block when the replacement text is
            the exact, complete replacement for the anchored lines of the
            file the comment is on — GitHub applies it verbatim to those
            lines with one click. If the fix belongs in a different file
            than the one you are commenting on, describe it in prose
            instead; never put another file's text in a suggestion block.
            When a finding spans two files (a change here contradicts text
            there), prefer anchoring the comment to the file that needs the
            edit, when that file is part of the diff.

            Finally, submit a review verdict with `gh pr review`:
            - If you are convinced the PR is correct, complete, and safe,
              approve it: `gh pr review --approve --body "..."` with a
              one-paragraph justification of what you checked. If approval
              is rejected for permission reasons, fall back to
              `gh pr review --comment --body "..."` with the same text.
            - If you confirmed a serious problem (a real bug, data
              corruption, security issue, or broken API), request changes:
              `gh pr review --request-changes --body "..."` summarizing the
              blocking findings. Reserve this for confirmed, consequential
              problems — never for uncertainty or taste.
            - Otherwise (minor or uncertain findings only), submit
              `gh pr review --comment --body "..."` with a short summary.
            On re-runs after new commits, submit a fresh verdict; an
            approval supersedes your earlier request-changes once the
            problems are fixed. Never merge the PR.
