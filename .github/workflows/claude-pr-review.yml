# Automatic Claude review of same-repository pull requests.
name: Claude PR review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    if: >-
      ${{
        !github.event.pull_request.draft &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.user.login != 'dependabot[bot]'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    env:
      HAS_CLAUDE_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Explain when this PR changes the review workflow
        id: self_check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          changed="$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" -- \
            .github/workflows/claude-pr-review.yml)"
          if [ -z "$changed" ]; then
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          marker='<!-- claude-review-workflow-skip -->'
          comments="$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[].body')"
          if [[ "$comments" != *"$marker"* ]]; then
            gh pr comment "$PR_NUMBER" --body '**Automatic Claude review was skipped.** This PR changes `.github/workflows/claude-pr-review.yml`, so the Claude action cannot safely run it until it is on the default branch.

          Please comment `@claude review this PR` to request a review through the default-branch workflow.

          <!-- claude-review-workflow-skip -->'
          fi

      - name: Prepare trusted review instructions
        if: >-
          steps.self_check.outputs.changed != 'true' &&
          env.HAS_CLAUDE_TOKEN == 'true'
        run: |
          policy="$RUNNER_TEMP/claude-pr-review-policy.md"
          {
            git show "origin/${GITHUB_BASE_REF}:.github/prompts/claude-pr-review.md"
            printf '\n\n# Repository review policy\n\n'
            git show "origin/${GITHUB_BASE_REF}:REVIEW.md"
          } > "$policy"

      - name: Review pull request with Claude
        if: >-
          steps.self_check.outputs.changed != 'true' &&
          env.HAS_CLAUDE_TOKEN == 'true'
        uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --model claude-sonnet-5
            --max-turns 30
            --allowedTools "Read,Grep,Glob,LS,Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"
            --append-system-prompt-file "${{ runner.temp }}/claude-pr-review-policy.md"
          prompt: |
            Review ${{ github.repository }} PR
            #${{ github.event.pull_request.number }}.
